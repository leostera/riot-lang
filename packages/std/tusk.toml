[package]
name = "std"
version = "0.1.0"
description = "Shared standard library surface for Riot and Tusk."
license = "Apache-2.0"
public = true

[tusk.fix]
rules = [ "-no-stdlib" ]

[tusk.fix.provider]
rules = [
  "no-stdlib",
  "prefer-bang-equal-inequality",
  "no-double-list-rev",
  "prefer-iter-over-ignored-map",
  "prefer-list-is-empty",
  "prefer-option-map-over-manual-match",
  "prefer-result-map-over-manual-match",
]

[dependencies]
miniriot = { path = "../miniriot" }
kernel = { path = "../kernel" }

[dev-dependencies]
propane = { path = "../propane" }

[build-dependencies]
fixme = { path = "../fixme" }
