[package]
name = "std"
version = "0.1.0"

[tusk.fix]
rules = [ "-no-stdlib" ]

[tusk.fix.provider]
rules = [ "no-stdlib", "prefer-bang-equal-inequality", "no-double-list-rev" ]

[dependencies]
miniriot = { path = "../miniriot" }
kernel = { path = "../kernel" }

[dev-dependencies]
propane = { path = "../propane" }

[build-dependencies]
tusk-fix-api = { path = "../tusk-fix-api" }
