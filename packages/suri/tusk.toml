[package]
name = "suri"
version = "0.0.1"
description = "Web framework, middleware, and routing for Riot applications."
license = "Apache-2.0"
public = true

[lib]
path = "src/suri.ml"

[dependencies]
std = { path = "../std", version = "*" }
http = { path = "../http", version = "*" }
blink = { path = "../blink", version = "*" }
tusk-model = { path = "../tusk-model", version = "*" }

