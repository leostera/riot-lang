[package]
name = "riot-eval"
version = "0.0.20"
description = "OCaml evaluation tooling for Riot"
license = "Apache-2.0"
public = false

[lib]
path = "src/riot_eval.ml"

[[bin]]
name = "riot-eval"
path = "src/main.ml"

[dependencies]
std = { path = "../std", version = "*" }
syn = { path = "../syn", version = "*" }
riot-toolchain = { path = "../riot-toolchain", version = "*" }
