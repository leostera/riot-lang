[package]
name = "tusk-fix"
version = "0.0.1"
description = "Linting and auto-fix pipeline for OCaml workspaces."
license = "Apache-2.0"
public = true

[lib]
path = "src/tusk_fix.ml"

[[bin]]
name = "tusk-fix"
path = "src/main.ml"

[dependencies]
std = { path = "../std", version = "*" }
syn = { path = "../syn", version = "*" }
tusk-model = { path = "../tusk-model", version = "*" }
fixme = { path = "../fixme", version = "*" }

[[bin]]
name = "fix_tests"
path = "tests/fix_tests.ml"

[[bin]]
name = "runner_tests"
path = "tests/runner_tests.ml"
