[package]
name = "blink"
version = "0.0.21"
description = "Streaming HTTP client built on Riot actors"
license = "Apache-2.0"
public = true

[lib]
path = "src/blink.ml"

[[bin]]
name = "simple_https"
path = "examples/simple_https.ml"

[[bin]]
name = "test_https_httpbin"
path = "examples/test_https_httpbin.ml"

[dependencies]
std = { path = "../std", version = "*" }
http = { path = "../http", version = "*" }
