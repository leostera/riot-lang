[package]
name = "tusk-eval"
version = "0.0.1"
description = "OCaml evaluation tooling for the Tusk toolchain."
license = "Apache-2.0"
public = true

[lib]
path = "src/tusk_eval.ml"

[[bin]]
name = "tusk-eval"
path = "src/main.ml"

[dependencies]
std = { path = "../std", version = "*" }
syn = { path = "../syn", version = "*" }
tusk-toolchain = { path = "../tusk-toolchain", version = "*" }
