[package]
name = "mysql"
version = "0.0.40"
description = "MySQL adapter for sqlx"
license = "Apache-2.0"
public = true

[lib]
path = "src/mysql.ml"

[dependencies]
std = "*"
kernel = "*"
sqlx-driver = "*"
serde = "*"

[dev-dependencies]
dotenv = { path = "../dotenv", version = "*" }
testcontainers = { path = "../testcontainers", version = "*" }

[[bin]]
name = "mysql_protocol_tests"
path = "tests/protocol_tests.ml"

[[bin]]
name = "mysql_auth_tests"
path = "tests/auth_tests.ml"

[[bin]]
name = "mysql_result_tests"
path = "tests/result_tests.ml"

[[bin]]
name = "mysql_statement_tests"
path = "tests/statement_tests.ml"

[[bin]]
name = "mysql_property_tests"
path = "tests/property_tests.ml"

[[bin]]
name = "mysql_fuzz_tests"
path = "tests/fuzz_tests.ml"

[[bin]]
name = "mysql_tests"
path = "tests/mysql_tests.ml"
