[package]
name = "typ"
version = "0.0.25"
description = "Incremental type checker engine for Riot"
license = "Apache-2.0"
public = true

[lib]
path = "src/typ.ml"

[dependencies]
std = { path = "../std", version = "*" }
ceibo = { path = "../ceibo", version = "*" }
syn = { path = "../syn", version = "*" }
contentstore = { path = "../contentstore", version = "*" }
serde = { path = "../serde", version = "*" }

[dev-dependencies]
serde-json = { path = "../serde-json", version = "*" }
