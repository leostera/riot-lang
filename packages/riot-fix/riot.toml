[package]
name = "riot-fix"
version = "0.0.35"
description = "Linting and auto-fix pipeline"
license = "Apache-2.0"
public = false

[lib]
path = "src/riot_fix.ml"

[[bin]]
name = "riot-fix"
path = "src/main.ml"

[dependencies]
std = { path = "../std", version = "*" }
syn = { path = "../syn", version = "*" }
riot-model = { path = "../riot-model", version = "*" }
fixme = { path = "../fixme", version = "*" }

[riot.fix]
ignore = ["tests/000*.ml"]

[[bin]]
name = "fix_tests"
path = "tests/fix_tests.ml"

[[bin]]
name = "runner_tests"
path = "tests/runner_tests.ml"

[[bin]]
name = "fixture_tests"
path = "tests/fixture_tests.ml"

[[bin]]
name = "autofix_fixture_tests"
path = "tests/autofix_fixture_tests.ml"
