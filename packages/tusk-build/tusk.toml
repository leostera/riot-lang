[package]
name = "tusk-build"
version = "0.0.1"
description = "In-process build session runtime for the Tusk server."
license = "Apache-2.0"
public = true

[lib]
path = "src/tusk_build.ml"

[dependencies]
std = { path = "../std", version = "*" }
tusk-model = { path = "../tusk-model", version = "*" }
tusk-deps = { path = "../tusk-deps", version = "*" }
pkgs-ml = { path = "../pkgs-ml", version = "*" }
tusk-executor = { path = "../tusk-executor", version = "*" }
tusk-planner = { path = "../tusk-planner", version = "*" }
tusk-store = { path = "../tusk-store", version = "*" }
tusk-toolchain = { path = "../tusk-toolchain", version = "*" }

[[bin]]
name = "cache_tests"
path = "tests/cache_tests.ml"

[[bin]]
name = "concurrent_tests"
path = "tests/concurrent_tests.ml"

[[bin]]
name = "server_tests"
path = "tests/server_tests.ml"
