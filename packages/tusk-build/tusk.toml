[package]
name = "tusk-build"
version = "0.0.1"
description = "In-process build session runtime for the Tusk server."
license = "Apache-2.0"
public = true

[lib]
path = "src/tusk_build.ml"

[dependencies]
std = { path = "../std" }
tusk-model = { path = "../tusk-model" }
tusk-deps = { path = "../tusk-deps" }
pkgs-ml = { path = "../pkgs-ml" }
tusk-executor = { path = "../tusk-executor" }
tusk-planner = { path = "../tusk-planner" }
tusk-store = { path = "../tusk-store" }
tusk-toolchain = { path = "../tusk-toolchain" }

[[bin]]
name = "cache_tests"
path = "tests/cache_tests.ml"

[[bin]]
name = "concurrent_tests"
path = "tests/concurrent_tests.ml"

[[bin]]
name = "server_tests"
path = "tests/server_tests.ml"
