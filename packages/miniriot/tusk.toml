[package]
name = "miniriot"
version = "0.0.1"

[tusk.fix]
rules = [ "-no-stdlib" ]

[tusk.fix.provider]
rules = [ "loop-yield" ]

[lib]
path = "src/miniriot.ml"

[dependencies]
kernel = { path = "../kernel" }

[build-dependencies]
fixme = { path = "../fixme" }

[dev-dependencies]
propane = { path = "../propane" }
std = { path = "../std" }
