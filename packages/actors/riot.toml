[package]
name = "actors"
license = "Apache-2.0"
description = "Compatibility facade for Riot's actor runtime"
version = "0.0.17"
categories = ["runtime", "actors"]
keywords = ["actors", "scheduler", "mailbox"]
public = true

[riot.fix]
rules = [ "-no-stdlib" ]

[riot.fix.provider]
rules = [ "loop-yield" ]

[lib]
path = "src/actors.ml"

[dependencies]
std = { path = "../std", version = "*" }

[build-dependencies]
fixme = { path = "../fixme", version = "*" }

[dev-dependencies]
propane = { path = "../propane", version = "*" }
