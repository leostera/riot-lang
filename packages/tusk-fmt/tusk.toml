[package]
name = "tusk-fmt"
version = "0.0.1"
description = "Formatting checks and wrappers around Krasny."
license = "Apache-2.0"
public = true

[lib]
path = "src/tusk_fmt.ml"

[[bin]]
name = "fmt_tests"
path = "tests/fmt_tests.ml"

[dependencies]
std = { path = "../std", version = "*" }
tusk-model = { path = "../tusk-model", version = "*" }
krasny = { path = "../krasny", version = "*" }
