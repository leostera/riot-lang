syntax = "proto3";

// This is a package comment
package test.comments;

// Message comment
message WithComments {
  // Field comment
  string name = 1; // inline comment
  
  /* Block comment
     spanning multiple lines */
  int32 id = 2;
  
  // More comments
  bool flag = 3; /* inline block */
}

/* Another
   block
   comment */
message Another {
  string value = 1;
}
