[package]
name = "tusk-server"
version = "0.0.1"

[lib]
path = "src/tusk_server.ml"

[dependencies]
std = { path = "../std" }
tusk-model = { path = "../tusk-model" }
tusk-executor = { path = "../tusk-executor" }
tusk-planner = { path = "../tusk-planner" }
tusk-store = { path = "../tusk-store" }
tusk-toolchain = { path = "../tusk-toolchain" }

[[bin]]
name = "cache_tests"
