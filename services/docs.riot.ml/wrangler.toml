name = "riot-docs"
main = "./worker/index.js"
compatibility_date = "2026-04-04"
compatibility_flags = [ "nodejs_compat" ]
workers_dev = false

[[routes]]
pattern = "docs.riot.ml"
custom_domain = true

[vars]
# Replace this with the actual Mintlify upstream hostname, for example:
# MINTLIFY_ORIGIN = "your-site.mintlify.app"
MINTLIFY_ORIGIN = "REPLACE_WITH_YOUR_MINTLIFY_HOST"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
