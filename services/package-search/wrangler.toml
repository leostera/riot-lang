name = "riot-package-search"
main = "worker.ts"
compatibility_date = "2026-03-27"
workers_dev = false

[vars]
CDN_BASE_URL = "https://cdn.pkgs.ml"
INDEX_BASE_PATH = "index/v1"

[[routes]]
pattern = "search.pkgs.ml"
custom_domain = true

[[r2_buckets]]
binding = "ML_PKGS_CDN"
bucket_name = "ml-pkgs-cdn"
preview_bucket_name = "ml-pkgs-cdn"

[[d1_databases]]
binding = "SEARCH_DB"
database_name = "riot-package-search"
database_id = "98a889ee-2e93-4f7b-8301-c6ad47ec5a0c"
migrations_dir = "migrations"

[[queues.consumers]]
queue = "riot-package-indexed"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
