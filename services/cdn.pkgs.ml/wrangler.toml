name = "riot-cdn"
main = "src/main.ts"
compatibility_date = "2026-03-27"
workers_dev = false

[[routes]]
pattern = "cdn.pkgs.ml/*"
zone_name = "pkgs.ml"

[[r2_buckets]]
binding = "ML_PKGS_CDN"
bucket_name = "ml-pkgs-cdn"
preview_bucket_name = "ml-pkgs-cdn"

[[d1_databases]]
binding = "SEARCH_DB"
database_name = "riot-registry"
database_id = "3a482dd8-a28f-4f87-a143-46153d492819"
preview_database_id = "3a482dd8-a28f-4f87-a143-46153d492819"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
