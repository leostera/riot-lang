name = "riot-registry"
main = "worker.ts"
compatibility_date = "2026-03-27"
workers_dev = false

[vars]
CDN_BASE_URL = "https://cdn.pkgs.ml"
INDEX_BASE_PATH = "index/v1"
VIEWS_BASE_PATH = "views/v1"
AUTH_COOKIE_DOMAIN = "pkgs.ml"
PKGS_WEB_BASE_URL = "https://pkgs.ml"

[[routes]]
pattern = "api.pkgs.ml"
custom_domain = true

[[routes]]
pattern = "registry.pkgs.ml"
custom_domain = true

[[durable_objects.bindings]]
name = "PUBLICATION_COORDINATOR"
class_name = "PublicationCoordinator"

[[r2_buckets]]
binding = "ML_PKGS_CDN"
bucket_name = "ml-pkgs-cdn"
preview_bucket_name = "ml-pkgs-cdn"

[[d1_databases]]
binding = "SEARCH_DB"
database_name = "riot-package-search"
database_id = "98a889ee-2e93-4f7b-8301-c6ad47ec5a0c"
migrations_dir = "../package-search/migrations"

[[queues.producers]]
binding = "PACKAGE_PUBLISHED_QUEUE"
queue = "riot-package-published"

[[queues.producers]]
binding = "PACKAGE_INDEXED_QUEUE"
queue = "riot-package-indexed"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PublicationCoordinator"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
