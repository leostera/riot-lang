name = "riot-pkgs-web"
main = "@astrojs/cloudflare/entrypoints/server"
compatibility_date = "2026-03-27"
compatibility_flags = [ "nodejs_compat" ]
workers_dev = false

[vars]
PUBLIC_INDEX_BASE_URL = "https://api.pkgs.ml"
PUBLIC_INDEX_BASE_PATH = "v1/index"
PUBLIC_CDN_BASE_URL = "https://cdn.pkgs.ml"

[[routes]]
pattern = "pkgs.ml"
custom_domain = true

[assets]
binding = "ASSETS"
directory = "./dist/client"

[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
