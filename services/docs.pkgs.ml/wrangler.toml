name = "pkgs-docs"
main = "src/main.ts"
compatibility_date = "2026-04-04"
compatibility_flags = [ "nodejs_compat" ]
workers_dev = false

[[routes]]
pattern = "docs.pkgs.ml"
custom_domain = true

[assets]
binding = "ASSETS"
directory = "./dist"

[[r2_buckets]]
binding = "ML_PKGS_CDN"
bucket_name = "ml-pkgs-cdn"
preview_bucket_name = "ml-pkgs-cdn"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
