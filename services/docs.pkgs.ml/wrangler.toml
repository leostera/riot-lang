name = "pkgs-docs"
main = "worker.ts"
compatibility_date = "2026-04-04"
compatibility_flags = [ "nodejs_compat" ]
workers_dev = false

[[routes]]
pattern = "docs.pkgs.ml"
custom_domain = true

[[containers]]
class_name = "DocsPipelineContainer"
image = "./Dockerfile"
instance_type = "basic"
max_instances = 4

[[durable_objects.bindings]]
name = "DOCS_PIPELINE_CONTAINER"
class_name = "DocsPipelineContainer"

[assets]
binding = "ASSETS"
directory = "./dist"

[[r2_buckets]]
binding = "ML_PKGS_CDN"
bucket_name = "ml-pkgs-cdn"
preview_bucket_name = "ml-pkgs-cdn"

[[d1_databases]]
binding = "SEARCH_DB"
database_name = "riot-registry"
database_id = "3a482dd8-a28f-4f87-a143-46153d492819"
preview_database_id = "3a482dd8-a28f-4f87-a143-46153d492819"

[[queues.consumers]]
queue = "riot-package-published"

[triggers]
crons = ["* * * * *"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DocsPipelineContainer"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
