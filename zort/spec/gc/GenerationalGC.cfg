\* Tiny TLC smoke config for the bounded collector slice.
\* Keep this intentionally small; it is meant to validate the protocol
\* invariants quickly during refactors, not to exhaustively prove the runtime.
SPECIFICATION Spec

CONSTANTS
  Objects = {o0, o1}
  Domains = {d0, d1}

INVARIANTS
  TypeOK
  RememberedSetCoversMajorToNurseryEdges
  ReachableObjectsRemainLive
  CollectionPhasesRequireStopTheWorld

\* Bound the smoke exploration depth so the check stays fast in the normal
\* development loop.
CONSTRAINT
  SmokeDepthBound
