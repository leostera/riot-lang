\* Tiny TLC smoke config for the scheduler-lane and runnable-transfer slice.
\* This checks ownership, lane-claim, and domain-consistency invariants under a
\* deliberately tiny number of domains, fibers, and workers.
SPECIFICATION Spec

CONSTANTS
  Domains = {d0, d1}
  Fibers = {f0, f1}
  Workers = {w0, w1}
  NoFiber = NoFiber
  NoWorker = NoWorker

INVARIANTS
  TypeOK
  FibersHaveExclusiveLaneOwnership
  LaneContentsMatchFiberDomain
  CurrentFibersAreNotQueued
  LaneMutationsUseClaims

\* Bound the smoke exploration depth so the capability model stays cheap to run.
CONSTRAINT
  SmokeDepthBound
