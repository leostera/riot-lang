\* Tiny TLC smoke config for the bounded continuation/control-flow slice.
\* This checks the one-shot and callback-boundary safety laws under a very small
\* set of fibers, domains, continuations, and effects.
SPECIFICATION Spec

CONSTANTS
  Fibers = {f0, f1}
  Domains = {d0, d1}
  Continuations = {k0, k1}
  Effects = {Ping}
  NoFiber = NoFiber
  NoDomain = NoDomain

INVARIANTS
  TypeOK
  CurrentFibersAreUnique
  CapturedContinuationsOwnRoots
  CapturedFibersAreNotCurrent
  CurrentFibersMatchTheirDomains
  UsedContinuationsDoNotReturnToCaptured
  CallbackBoundariesCutParentTraversal
  PerformStartsSearchAtCurrentFiber
  ReperformStartsSearchAtVisibleParent

\* Bound the smoke exploration depth so we can run this as a quick protocol
\* sanity check while the runtime evolves.
CONSTRAINT
  SmokeDepthBound
