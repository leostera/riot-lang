[package]
name = "syn"
version = "0.0.36"
description = "Lexer, streaming parser, Ast views, and diagnostics toolkit"
license = "Apache-2.0"
public = true

[lib]
path = "src/syn.ml"

[[bin]]
name = "syn"
path = "src/main.ml"

[dependencies]
std = { path = "../../packages/std", version = "*" }
tty = { path = "../../packages/tty", version = "*" }
colors = { path = "../../packages/colors", version = "*" }
