\* Tiny TLC smoke config for the bounded pending-action drain protocol.
\* This checks that pending work is not lost or duplicated, and that delivery
\* only happens at explicit runtime checkpoints.
SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
  Domains = {d0, d1}
  Actions = {a0, a1}

INVARIANTS
  TypeOK
  UniquePending
  PendingAndDeliveredDisjoint
  KnownActionsAreTracked
  EveryDeliveredActionHasExactlyOneCheckpoint
  DeliveredActionsOnlyUseLegalCheckpoints
  StopTheWorldAcknowledgementsAreRequested

\* Bound the smoke exploration depth so the protocol check stays cheap.
CONSTRAINT
  SmokeDepthBound
