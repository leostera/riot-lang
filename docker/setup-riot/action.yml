name: Setup Riot
description: Install Riot on the runner with the official installer script.

inputs:
  install-url:
    description: Installer script URL to fetch and run.
    required: false
    default: https://get.riot.ml
  add-to-path:
    description: Whether to add ~/.riot/bin to the job PATH.
    required: false
    default: "true"

outputs:
  riot-bin:
    description: Absolute path to the installed riot binary.
    value: ${{ steps.install.outputs.riot-bin }}
  riot-home:
    description: Absolute path to the runner's Riot home directory.
    value: ${{ steps.install.outputs.riot-home }}
  install-url:
    description: Installer URL used by the action.
    value: ${{ steps.install.outputs.install-url }}

runs:
  using: composite
  steps:
    - id: install
      shell: bash
      env:
        INPUT_INSTALL_URL: ${{ inputs.install-url }}
        INPUT_ADD_TO_PATH: ${{ inputs.add-to-path }}
      run: |
        "$GITHUB_ACTION_PATH/install.sh"
