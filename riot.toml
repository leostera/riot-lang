ignore = [
  "tests/fixtures",
  "tests/generated",
  "tests/diagnostics",
  "tests/deps_fixtures",
  "tests/autofix_fixtures",
  "tests/workspace_fixtures",
]

[dependencies]
# Shared external dependencies across workspace members

[riot.fmt]
ignore = [ 
  "fixtures",
  "diagnostics",
  "expected",
  ".worktrees",
]

[riot.fix]
ignore = [ 
  "fixtures",
  "diagnostics",
  "expected",
  ".worktrees",
]
rules = [
  "no-stdlib", 
  "-limit-function-parameters",
  "-ordered-argument-kinds",
  "-class-case-module-names",
  "-limit-open-statements",
  "-no-unnecessary-rec",
  "-limit-nested-match-depth",
  "-prefer-pipelines-for-nested-calls",
  "-std:prefer-result-map-over-manual-match",
]
