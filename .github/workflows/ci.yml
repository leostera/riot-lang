name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build with Tusk
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build with riot-builder
        run: |
          # Use the latest riot-builder image
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/riot-builder:latest"
          echo "Building with: ${IMAGE}"
          
          # Run tusk build inside the container
          docker run --rm \
            -v "$(pwd):/app" \
            -w /app \
            ${IMAGE} \
            build --no-code-server
          
          echo "✓ Build completed successfully!"
      
      - name: Run tests
        run: |
          # Use the riot-builder image to run tests
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/riot-builder:latest"
          echo "Running tests with: ${IMAGE}"
          
          docker run --rm \
            -v "$(pwd):/app" \
            -w /app \
            ${IMAGE} \
            test --no-code-server
          
          echo "✓ Tests completed successfully!"
      
      - name: Verify build artifacts
        run: |
          echo "Checking build artifacts..."
          ls -la _build/debug/
          echo "✓ Build artifacts verified!"
