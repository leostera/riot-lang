name: Release Tusk Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.0.1)'
        required: true

permissions:
  contents: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build for Linux (both x86_64 and aarch64) using riot-builder
  build-linux:
    name: Build Linux Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
            triple: x86_64-unknown-linux-gnu
          - arch: aarch64
            platform: linux/arm64
            triple: aarch64-unknown-linux-gnu
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"
      
      - name: Build Tusk for ${{ matrix.arch }}
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/riot-builder:latest"
          
          # Build tusk-cli using the riot-builder image
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v "$(pwd):/app" \
            -w /app \
            ${IMAGE} \
            build --release --no-code-server tusk-cli
          
          # The binary should be in _build/release/out/Tusk_cli/tusk
          ls -la _build/release/out/Tusk_cli/
      
      - name: Package binary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL="tusk-${VERSION}-${{ matrix.triple }}.tar.gz"
          
          mkdir -p dist
          cp _build/release/out/Tusk_cli/tusk dist/
          chmod +x dist/tusk
          
          # Create tarball
          cd dist
          tar czf "../${TARBALL}" tusk
          cd ..
          
          echo "Created: ${TARBALL}"
          ls -lh "${TARBALL}"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tusk-${{ matrix.triple }}
          path: tusk-*.tar.gz
  
  # Build for macOS (aarch64 only, since GitHub doesn't have aarch64 runners yet we use x86_64 and note it)
  build-macos:
    name: Build macOS Binary
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"
      
      - name: Bootstrap Tusk
        run: |
          # Bootstrap tusk using the bootstrap script
          ./bootstrap.py
          ./minitusk
          
          # Build tusk proper
          ./_build/bootstrap/out/Tusk_cli/tusk build --release --no-code-server tusk-cli
      
      - name: Package binary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # GitHub macOS runners are x86_64, but note this in the filename
          TARBALL="tusk-${VERSION}-x86_64-apple-darwin.tar.gz"
          
          mkdir -p dist
          cp _build/release/out/Tusk_cli/tusk dist/
          chmod +x dist/tusk
          
          # Create tarball
          cd dist
          tar czf "../${TARBALL}" tusk
          cd ..
          
          echo "Created: ${TARBALL}"
          ls -lh "${TARBALL}"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tusk-x86_64-apple-darwin
          path: tusk-*.tar.gz
  
  # Create GitHub release and upload all binaries
  create-release:
    name: Create Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Display artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Tusk ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
          body: |
            # Tusk ${{ steps.version.outputs.version }}
            
            ## Installation
            
            Download the appropriate binary for your platform:
            
            - **Linux x86_64**: `tusk-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz`
            - **Linux aarch64**: `tusk-${{ steps.version.outputs.version }}-aarch64-unknown-linux-gnu.tar.gz`
            - **macOS x86_64**: `tusk-${{ steps.version.outputs.version }}-x86_64-apple-darwin.tar.gz`
            
            ### Quick Install
            
            ```bash
            # Download and extract (adjust URL for your platform)
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/tusk-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz | tar xz
            
            # Move to PATH
            mkdir -p ~/.tusk/bin
            mv tusk ~/.tusk/bin/
            
            # Add to PATH (add to your .bashrc/.zshrc)
            export PATH="$HOME/.tusk/bin:$PATH"
            
            # Verify installation
            tusk --version
            ```
