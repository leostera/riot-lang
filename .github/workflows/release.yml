name: Release Tusk Binaries

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.0.1)'
        required: true

permissions:
  contents: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build for Linux (both x86_64 and aarch64, both GNU and musl)
  build-linux:
    name: Build Linux Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            libc: gnu
            triple: x86_64-unknown-linux-gnu
          - arch: x86_64
            libc: musl
            triple: x86_64-unknown-linux-musl
          - arch: aarch64
            libc: gnu
            triple: aarch64-unknown-linux-gnu
          - arch: aarch64
            libc: musl
            triple: aarch64-unknown-linux-musl
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Cache Tusk toolchains
        uses: actions/cache@v4
        with:
          path: ~/.tusk
          key: tusk-toolchains-${{ runner.os }}-${{ matrix.triple }}-${{ hashFiles('ocaml-toolchain.toml') }}
          restore-keys: |
            tusk-toolchains-${{ runner.os }}-${{ matrix.triple }}-
            tusk-toolchains-${{ runner.os }}-
      
      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: _build
          key: tusk-build-${{ runner.os }}-${{ matrix.triple }}-${{ github.sha }}
          restore-keys: |
            tusk-build-${{ runner.os }}-${{ matrix.triple }}-
            tusk-build-${{ runner.os }}-
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            git \
            python3 \
            python3-pip \
            libssl-dev \
            uuid-dev \
            libzstd-dev \
            musl-tools \
            musl-dev
      
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Tagged release: use the tag version
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            # Regular commit: use short SHA
            VERSION="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"
      
      - name: Build Tusk for ${{ matrix.triple }}
        run: |
          # Bootstrap
          ./bootstrap.py
          ./minitusk
          
          # Build for target (cross-compile for musl and aarch64)
          if [[ "${{ matrix.triple }}" == "x86_64-unknown-linux-gnu" ]]; then
            # Native build for x86_64 GNU
            ./_build/bootstrap/out/Tusk_cli/tusk build --no-code-server tusk-cli
          else
            # Cross-compile for other targets
            ./_build/bootstrap/out/Tusk_cli/tusk build --no-code-server -x ${{ matrix.triple }} tusk-cli
          fi

          # Verify the binary and show version
          _build/debug/${{ matrix.triple }}/out/tusk-cli/tusk version
      
      - name: Package binary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL="tusk-${VERSION}-${{ matrix.triple }}.tar.gz"
          
          mkdir -p dist
          cp _build/debug/${{ matrix.triple }}/out/tusk-cli/tusk dist/
          chmod +x dist/tusk
          
          # Create tarball
          cd dist
          tar czf "../${TARBALL}" tusk
          cd ..
          
          echo "Created: ${TARBALL}"
          ls -lh "${TARBALL}"
      
      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
        run: |
          # Install AWS CLI
          sudo apt-get install -y awscli
          
          # Configure AWS CLI
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set default.region us-east-1
          
          VERSION="${{ steps.version.outputs.version }}"
          
          # Upload all tarballs to S3
          for tarball in tusk-*.tar.gz; do
            if [ -f "$tarball" ]; then
              echo "Uploading $tarball to S3..."
              aws s3 cp "$tarball" \
                "s3://${S3_BUCKET}/tusk/${VERSION}/$tarball" \
                --endpoint-url "$S3_ENDPOINT" \
                --acl public-read
              
              echo "✓ Uploaded: $tarball"
              echo "📦 Download URL: https://${S3_BUCKET}/tusk/${VERSION}/$tarball"
            fi
          done
  
  # Build for macOS aarch64 (Apple Silicon)
  build-macos:
    name: Build macOS aarch64 Binary
    runs-on: macos-14  # macOS 14 runs on Apple Silicon (aarch64)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Cache Tusk toolchains
        uses: actions/cache@v4
        with:
          path: ~/.tusk
          key: tusk-toolchains-${{ runner.os }}-aarch64-apple-darwin-${{ hashFiles('ocaml-toolchain.toml') }}
          restore-keys: |
            tusk-toolchains-${{ runner.os }}-aarch64-apple-darwin-
            tusk-toolchains-${{ runner.os }}-
      
      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: _build
          key: tusk-build-${{ runner.os }}-aarch64-apple-darwin-${{ github.sha }}
          restore-keys: |
            tusk-build-${{ runner.os }}-aarch64-apple-darwin-
            tusk-build-${{ runner.os }}-
      
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Tagged release: use the tag version
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            # Regular commit: use short SHA
            VERSION="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"
      
      - name: Install dependencies
        run: |
          brew install openssl@3
      
      - name: Build Tusk
        run: |
          # Bootstrap tusk using the bootstrap script
          ./bootstrap.py
          ./minitusk
          
          # Build tusk proper
          ./_build/bootstrap/out/Tusk_cli/tusk build --no-code-server tusk-cli
          
          # Verify the binary and show version
          _build/debug/aarch64-apple-darwin/out/tusk-cli/tusk version
      
      - name: Verify architecture
        run: |
          file _build/debug/aarch64-apple-darwin/out/tusk-cli/tusk
          lipo -archs _build/debug/aarch64-apple-darwin/out/tusk-cli/tusk
      
      - name: Package binary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL="tusk-${VERSION}-aarch64-apple-darwin.tar.gz"
          
          mkdir -p dist
          cp _build/debug/aarch64-apple-darwin/out/tusk-cli/tusk dist/
          chmod +x dist/tusk
          
          # Create tarball
          cd dist
          tar czf "../${TARBALL}" tusk
          cd ..
          
          echo "Created: ${TARBALL}"
          ls -lh "${TARBALL}"
      
      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
        run: |
          # Install AWS CLI
          brew install awscli
          
          # Configure AWS CLI
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set default.region us-east-1
          
          VERSION="${{ steps.version.outputs.version }}"
          
          # Upload all tarballs to S3
          for tarball in tusk-*.tar.gz; do
            if [ -f "$tarball" ]; then
              echo "Uploading $tarball to S3..."
              aws s3 cp "$tarball" \
                "s3://${S3_BUCKET}/tusk/${VERSION}/$tarball" \
                --endpoint-url "$S3_ENDPOINT" \
                --acl public-read
              
              echo "✓ Uploaded: $tarball"
              echo "📦 Download URL: https://${S3_BUCKET}/tusk/${VERSION}/$tarball"
            fi
          done
  
  # Create GitHub release and upload all binaries
  # Temporarily disabled due to artifact storage quota
  create-release-disabled:
    name: Create Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_TAG=true
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Tagged release: use the tag version
            VERSION="${GITHUB_REF#refs/tags/}"
            IS_TAG=true
          else
            # Regular commit: use short SHA
            VERSION="sha-$(echo ${{ github.sha }} | cut -c1-7)"
            IS_TAG=false
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_tag=${IS_TAG}" >> $GITHUB_OUTPUT
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Display artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f
      
      - name: Create Tagged Release
        if: steps.version.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Tusk ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
          body: |
            # Tusk ${{ steps.version.outputs.version }}
            
            ## Installation
            
            Download the appropriate binary for your platform:
            
            ### Linux
            - **x86_64 (GNU libc)**: `tusk-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz`
            - **x86_64 (musl libc)**: `tusk-${{ steps.version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz`
            - **aarch64 (GNU libc)**: `tusk-${{ steps.version.outputs.version }}-aarch64-unknown-linux-gnu.tar.gz`
            - **aarch64 (musl libc)**: `tusk-${{ steps.version.outputs.version }}-aarch64-unknown-linux-musl.tar.gz`
            
            ### macOS
            - **Apple Silicon (M1/M2/M3)**: `tusk-${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz`
            
            ### Quick Install
            
            ```bash
            # Set your platform (adjust as needed)
            PLATFORM="x86_64-unknown-linux-gnu"  # or aarch64-apple-darwin for macOS
            VERSION="${{ steps.version.outputs.version }}"
            
            # Download and extract
            curl -L "https://github.com/${{ github.repository }}/releases/download/${VERSION}/tusk-${VERSION}-${PLATFORM}.tar.gz" | tar xz
            
            # Move to PATH
            mkdir -p ~/.tusk/bin
            mv tusk ~/.tusk/bin/
            
            # Add to PATH (add to your .bashrc/.zshrc/.config/fish/config.fish)
            export PATH="$HOME/.tusk/bin:$PATH"
            
            # Verify installation
            tusk --version
            ```
            
            ### Notes
            
            - **musl builds**: Cross-compiled using tusk's `-x` flag
            - **macOS Intel**: Not provided in this release. Use Rosetta 2 to run the aarch64 binary on Intel Macs.
      
      - name: Update Latest Release
        if: steps.version.outputs.is_tag == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Tusk Latest (Development Build)
          draft: false
          prerelease: true
          files: |
            artifacts/**/*.tar.gz
          body: |
            # Tusk Latest Development Build
            
            **Commit**: ${{ github.sha }}
            **Version**: ${{ steps.version.outputs.version }}
            
            This is an automatically generated development build from the latest commit to `main`.
            
            ## Installation
            
            Download the appropriate binary for your platform and extract it:
            
            ### Available Platforms
            - Linux x86_64 (GNU libc)
            - Linux x86_64 (musl libc)  
            - Linux aarch64 (GNU libc)
            - Linux aarch64 (musl libc)
            - macOS aarch64 (Apple Silicon)
            
            ### Quick Install
            
            ```bash
            # Set your platform
            PLATFORM="x86_64-unknown-linux-gnu"  # or aarch64-apple-darwin for macOS
            VERSION="${{ steps.version.outputs.version }}"
            
            # Download and extract
            curl -L "https://github.com/${{ github.repository }}/releases/download/latest/tusk-${VERSION}-${PLATFORM}.tar.gz" | tar xz
            
            # Move to PATH
            mkdir -p ~/.tusk/bin
            mv tusk ~/.tusk/bin/
            export PATH="$HOME/.tusk/bin:$PATH"
            
            # Verify
            tusk --version
            ```
            
            ⚠️ **Warning**: This is a development build and may be unstable.
