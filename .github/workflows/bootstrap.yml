name: Bootstrap Tusk Build System

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/gluon/**'
      - 'packages/miniriot/**'
      - 'packages/tusk/**'
      - 'packages/minitusk/**'
      - '.github/workflows/bootstrap.yml'
  pull_request:
    branches: [ main ]

jobs:
  bootstrap:
    name: Bootstrap and Test Tusk
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Cache Tusk toolchains and downloads
      uses: actions/cache@v4
      with:
        path: ~/.tusk
        key: ${{ runner.os }}-tusk-${{ hashFiles('ocaml-toolchain.toml') }}
        restore-keys: |
          ${{ runner.os }}-tusk-
    
    - name: Bootstrap with Python
      run: ./bootstrap.py
      
    - name: Build with Minitusk
      run: ./minitusk
      
    - name: Build with Bootstrap Tusk
      run: ./target/bootstrap/tusk build
      
    - name: Copy Tusk to root
      run: cp ./target/debug/tusk tusk
      
    - name: Clean target directory
      run: rm -rf ./target
      
    - name: Build with Self-hosted Tusk
      run: ./tusk build
      
    - name: Test Tusk Help
      run: ./target/debug/tusk --help
      
    - name: Verify Build Artifacts
      run: |
        echo "=== Checking build artifacts ==="
        ls -la ./target/debug/
        echo "=== Checking tusk executable ==="
        file ./target/debug/tusk
        ./target/debug/tusk --version || echo "No version flag yet"
    
    - name: Upload Tusk Binary
      uses: actions/upload-artifact@v4
      with:
        name: tusk-${{ runner.os }}-${{ runner.arch }}
        path: ./target/debug/tusk
        retention-days: 7

  release:
    name: Create Release
    needs: bootstrap
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Prepare release binaries
      run: |
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        DATE=$(date +'%Y%m%d')
        mkdir -p release
        for dir in artifacts/tusk-*; do
          platform=$(basename "$dir" | sed 's/tusk-//')
          # Convert runner OS/arch to host triplet format
          case "$platform" in
            "Linux-X64")
              host_triplet="x86_64-unknown-linux-gnu"
              ;;
            "macOS-X64")
              host_triplet="x86_64-apple-darwin"
              ;;
            "macOS-ARM64")
              host_triplet="aarch64-apple-darwin"
              ;;
            *)
              host_triplet="$platform"
              ;;
          esac
          binary_name="tusk-${host_triplet}-${SHORT_SHA}-${DATE}"
          cp "$dir/tusk" "release/${binary_name}"
          chmod +x "release/${binary_name}"
          echo "Created: release/${binary_name}"
        done
        ls -la release/
    
    - name: Upload to existing nightly release
      run: |
        # Check if nightly release exists
        if gh release view nightly &>/dev/null; then
          echo "Updating existing nightly release"
          # Delete old assets from nightly release
          gh release view nightly --json assets -q '.assets[].name' | while read asset; do
            if [[ $asset == tusk-* ]]; then
              gh release delete-asset nightly "$asset" -y || true
            fi
          done
        else
          echo "Creating nightly release"
          gh release create nightly --title "Nightly Build" --notes "Automated nightly build" --prerelease
        fi
        
        # Upload new binaries
        gh release upload nightly release/tusk-* --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Update release notes
      run: |
        cat > release-notes.md << 'EOF'
        ## Tusk Build System - Nightly Build
        
        **Latest Commit:** ${{ github.sha }}
        **Build Date:** $(date +'%Y-%m-%d %H:%M:%S UTC')
        
        This is an automated nightly build of the Tusk build system.
        
        ### Installation
        
        Download the appropriate binary for your platform:
        
        ```bash
        # macOS Intel/Apple Silicon
        curl -L https://github.com/${{ github.repository }}/releases/download/nightly/tusk-x86_64-apple-darwin-$(echo ${{ github.sha }} | cut -c1-7)-$(date +'%Y%m%d') -o tusk
        chmod +x tusk
        ```
        
        **Note:** Linux builds are temporarily disabled while we work on cross-platform support.
        
        ### Recent Changes
        
        **Commit:** ${{ github.event.head_commit.message }}
        **Author:** ${{ github.event.head_commit.author.name }}
        EOF
        
        gh release edit nightly --notes-file release-notes.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}