name: Bootstrap Tusk Build System

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/**'
      - '.github/workflows/bootstrap.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  bootstrap:
    name: Bootstrap and Test Tusk
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev uuid-dev libzstd-dev
    
    - name: Cache Tusk toolchains and downloads
      uses: actions/cache@v4
      with:
        path: ~/.tusk
        key: ${{ runner.os }}-tusk-${{ hashFiles('ocaml-toolchain.toml') }}
        restore-keys: |
          ${{ runner.os }}-tusk-
    
    - name: Bootstrap with Python
      run: ./bootstrap.py
      
    - name: Build with Minitusk
      run: ./minitusk
      
    - name: Test Bootstrap Tusk
      run: ./_build/bootstrap/out/Tusk_cli/tusk --help
      
    - name: Verify Build Artifacts
      run: |
        echo "=== Checking build artifacts ==="
        ls -la ./_build/bootstrap/out/Tusk_cli/
        echo "=== Checking tusk executable ==="
        file ./_build/bootstrap/out/Tusk_cli/tusk
        ./_build/bootstrap/out/Tusk_cli/tusk --version || echo "No version flag yet"
    
    - name: Upload Tusk Binary
      uses: actions/upload-artifact@v4
      with:
        name: tusk-${{ runner.os }}-${{ runner.arch }}
        path: ./_build/bootstrap/out/Tusk_cli/tusk
        retention-days: 7

  release:
    name: Create Release
    needs: bootstrap
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Prepare release binaries
      run: |
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        DATE=$(date +'%Y%m%d')
        mkdir -p release
        for dir in artifacts/tusk-*; do
          platform=$(basename "$dir" | sed 's/tusk-//')
          # Convert runner OS/arch to host triplet format
          case "$platform" in
             "Linux-X64")
              host_triplet="x86_64-unknown-linux-gnu"
              ;;
            "Linux-ARM64")
              host_triplet="aarch64-unknown-linux-gnu"
              ;;
            "macOS-X64")
              host_triplet="x86_64-apple-darwin"
              ;;
            "macOS-ARM64")
              host_triplet="aarch64-apple-darwin"
              ;;
            *)
              host_triplet="$platform"
              ;;
          esac
          binary_name="tusk-${host_triplet}-${SHORT_SHA}-${DATE}"
          cp "$dir/tusk" "release/${binary_name}"
          chmod +x "release/${binary_name}"
          echo "Created: release/${binary_name}"
        done
        ls -la release/
    
    - name: Upload to existing nightly release
      run: |
        # Check if nightly release exists
        if gh release view nightly &>/dev/null; then
          echo "Updating existing nightly release"
          # Delete old assets from nightly release
          gh release view nightly --json assets -q '.assets[].name' | while read asset; do
            if [[ $asset == tusk-* ]]; then
              gh release delete-asset nightly "$asset" -y || true
            fi
          done
        else
          echo "Creating nightly release"
          gh release create nightly --title "Nightly Build" --notes "Automated nightly build" --prerelease
        fi
        
        # Upload new binaries
        gh release upload nightly release/tusk-* --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Update release notes
      run: |
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        DATE=$(date +'%Y%m%d')
        BUILD_TIME=$(date +'%Y-%m-%d %H:%M:%S UTC')
        
        cat > release-notes.md << EOF
        ## Tusk Build System - Nightly Build
        
        **Latest Commit:** ${{ github.sha }}
        **Build Date:** ${BUILD_TIME}
        
        This is an automated nightly build of the Tusk build system.
        
        ### Installation
        
        Download the appropriate binary for your platform:
        
        \`\`\`bash
        # macOS Apple Silicon (M1/M2/M3)
        curl -L https://github.com/${{ github.repository }}/releases/download/nightly/tusk-aarch64-apple-darwin-${SHORT_SHA}-${DATE} -o tusk
        chmod +x tusk
        
        # macOS Intel
        curl -L https://github.com/${{ github.repository }}/releases/download/nightly/tusk-x86_64-apple-darwin-${SHORT_SHA}-${DATE} -o tusk
        chmod +x tusk
        
        # Linux x86_64
        curl -L https://github.com/${{ github.repository }}/releases/download/nightly/tusk-x86_64-unknown-linux-gnu-${SHORT_SHA}-${DATE} -o tusk
        chmod +x tusk
        \`\`\`
        
        ### Recent Changes
        
        **Commit:** ${{ github.event.head_commit.message }}
        **Author:** ${{ github.event.head_commit.author.name }}
        EOF
        
        gh release edit nightly --notes-file release-notes.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
