name: Build Docker Images

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/**'
      - 'docker/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-riot-builder:
    name: Build Riot Builder Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/riot-builder
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push riot-builder
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: builder
          build-args: |
            CACHEBUST=${{ github.sha }}
      
      - name: Test the image
        if: github.event_name != 'pull_request'
        run: |
          # Get the image tag for testing (use the sha tag that was just built)
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/riot-builder:sha-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "Testing image: ${IMAGE_TAG}"
          
          # Wait a moment for the image to be available
          sleep 5
          
          # Test that tusk is available and works
          docker run --rm ${IMAGE_TAG} --help
          
          echo "✓ Image test passed!"
  
  build-example-app:
    name: Build Example Application
    needs: build-riot-builder
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build example app with riot-builder
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/riot-builder:sha-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "Building with: ${IMAGE_TAG}"
          
          # Create a simple test Dockerfile
          cat > Dockerfile.test << 'EOF'
          ARG BUILDER_IMAGE
          FROM ${BUILDER_IMAGE} AS build
          
          WORKDIR /app
          COPY . /app
          
          # Try to build kernel package as a quick test
          RUN tusk build kernel
          
          # Verify the build succeeded
          RUN test -d _build/debug && echo "✓ Build directory exists"
          EOF
          
          # Build with the riot-builder image
          docker build \
            --build-arg BUILDER_IMAGE=${IMAGE_TAG} \
            -f Dockerfile.test \
            -t test-app:latest \
            .
          
          echo "✓ Example app built successfully!"
  
  release-summary:
    name: Release Summary
    needs: [build-riot-builder, build-example-app]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Create summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🐳 Docker Images Built Successfully
          
          ### Available Images
          
          \`\`\`
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/riot-builder:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/riot-builder:sha-$(echo ${{ github.sha }} | cut -c1-7)
          \`\`\`
          
          ### Usage
          
          Pull the image:
          \`\`\`bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/riot-builder:latest
          \`\`\`
          
          Build your application:
          \`\`\`dockerfile
          FROM ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/riot-builder:latest AS build
          WORKDIR /app
          COPY . /app
          RUN tusk build --release my-app
          EOF
