name: Build Toolchain Binaries

on:
  push:
    branches: [ main ]
    paths:
      - 'ocaml/**'
      - '.github/workflows/build-toolchains.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'ocaml/**'
      - '.github/workflows/build-toolchains.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tools:
    name: Build dev tools for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
        ocaml_version: ['5.3.0']
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Verify submodules
      run: |
        echo "=== Checking submodules ==="
        ls -la ocaml/
        test -d ocaml/ocaml-lsp-server || (echo "Error: ocaml-lsp-server submodule missing" && exit 1)
        test -d ocaml/odoc || (echo "Error: odoc submodule missing" && exit 1)
        test -d ocaml/ocamlformat || (echo "Error: ocamlformat submodule missing" && exit 1)
    
    - name: Setup OCaml ${{ matrix.ocaml_version }}
      uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: ${{ matrix.ocaml_version }}
    
    - name: Build OCaml tools using script
      run: |
        cd ocaml
        ./build-tools.sh
    
    - name: Copy artifacts to root
      run: |
        cp ocaml/ocaml-platform-*.tar.gz .
        ls -la *.tar.gz
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ocaml-platform-${{ matrix.ocaml_version }}-${{ runner.os }}-${{ runner.arch }}
        path: ocaml-platform-*.tar.gz
    
  release:
    needs: build-tools
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ocaml-platform-*/*.tar.gz
        body: |
          Pre-built OCaml development tools for Tusk.
          
          Includes:
          - ocamllsp (OCaml Language Server)
          - odoc (Documentation generator)
          - ocamlformat (Code formatter)
          
          ## Usage
          
          Extract the tarball to get the tools:
          ```bash
          tar xzf ocaml-platform-*.tar.gz
          export PATH="$PWD/bin:$PATH"
          ```