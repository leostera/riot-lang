name: Build Toolchain Binaries

on:
  push:
    tags:
      - 'toolchain-v*'
  workflow_dispatch:
    inputs:
      ocaml_version:
        description: 'OCaml version to build tools for'
        required: true
        default: '5.3.0'

jobs:
  build-tools:
    name: Build dev tools for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        ocaml_version: ['5.3.0']
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    
    - name: Setup OCaml ${{ matrix.ocaml_version }}
      uses: ocaml/setup-ocaml@v2
      with:
        ocaml-compiler: ${{ matrix.ocaml_version }}
        dune-cache: true
    
    - name: Install dependencies
      run: |
        opam install -y dune menhir csexp
    
    - name: Build ocaml-lsp-server
      run: |
        cd ocaml/ocaml-lsp-server
        opam install -y . --deps-only
        dune build @install
        dune install --prefix=../../_install
    
    - name: Build odoc
      run: |
        cd ocaml/odoc
        opam install -y . --deps-only
        dune build @install
        dune install --prefix=../../_install
    
    - name: Build ocamlformat
      run: |
        cd ocaml/ocamlformat
        opam install -y . --deps-only
        dune build @install
        dune install --prefix=../../_install
    
    - name: Package binaries
      run: |
        cd _install
        tar czf ../tusk-tools-${{ matrix.ocaml_version }}-${{ runner.os }}-${{ runner.arch }}.tar.gz bin/
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: tusk-tools-${{ matrix.ocaml_version }}-${{ runner.os }}-${{ runner.arch }}
        path: tusk-tools-*.tar.gz
    
  release:
    needs: build-tools
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v3
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          tusk-tools-*/tusk-tools-*.tar.gz
        body: |
          Pre-built development tools for tusk toolchains.
          
          Includes:
          - ocamllsp (OCaml Language Server)
          - odoc (Documentation generator)
          - ocamlformat (Code formatter)