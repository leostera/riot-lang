name: Build Toolchain Binaries

on:
  push:
    branches: [ main ]
    paths:
      - 'ocaml/**'
      - '.github/workflows/build-toolchains.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'ocaml/**'
      - '.github/workflows/build-toolchains.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tools:
    name: Build dev tools for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
        ocaml_version: ['5.3.0']
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Verify submodules
      run: |
        echo "=== Checking submodules ==="
        ls -la ocaml/
        test -d ocaml/ocaml-lsp-server || (echo "Error: ocaml-lsp-server submodule missing" && exit 1)
        test -d ocaml/odoc || (echo "Error: odoc submodule missing" && exit 1)
        test -d ocaml/ocamlformat || (echo "Error: ocamlformat submodule missing" && exit 1)
    
    - name: Setup OCaml ${{ matrix.ocaml_version }}
      uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: ${{ matrix.ocaml_version }}
    
    - name: Build OCaml tools using script
      run: |
        cd ocaml
        ./build-tools.sh
    
    - name: Copy artifacts to root
      run: |
        cp ocaml/ocaml-platform-*.tar.gz .
        ls -la *.tar.gz
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ocaml-platform-${{ matrix.ocaml_version }}-${{ runner.os }}-${{ runner.arch }}
        path: ocaml-platform-*.tar.gz
    
    - name: Upload to S3 CDN
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        AWS_ENDPOINT_URL: https://hel1.your-objectstorage.com
        AWS_REGION: us-east-1
      run: |
        # Install AWS CLI if not present
        if ! command -v aws &> /dev/null; then
          echo "Installing AWS CLI..."
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            brew install awscli
          else
            sudo apt-get update && sudo apt-get install -y awscli
          fi
        fi
        
        # Upload the tarball to S3
        for tarball in ocaml-platform-*.tar.gz; do
          if [ -f "$tarball" ]; then
            echo "Uploading $tarball to S3..."
            aws s3 cp "$tarball" s3://ml-riot-cdn/ocaml-platform/ \
              --endpoint-url "$AWS_ENDPOINT_URL" \
              --acl public-read
          fi
        done
    
  release:
    needs: build-tools
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Update or create ocaml-platform tag
      run: |
        # Delete the tag if it exists (locally and remotely)
        git tag -d ocaml-platform 2>/dev/null || true
        git push origin :refs/tags/ocaml-platform 2>/dev/null || true
        
        # Create new tag at current commit
        git tag ocaml-platform
        git push origin ocaml-platform
    
    - name: Create or Update Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ocaml-platform
        name: OCaml Platform Tools
        prerelease: true
        files: |
          ocaml-platform-*/*.tar.gz
        body: |
          ## OCaml Platform Tools for Tusk
          
          **OCaml Version:** 5.3.0
          **Latest Build:** ${{ github.sha }}
          
          ### Included Tools
          - **ocamlformat** - Code formatter
          - **odoc** - Documentation generator
          - **ocamllsp** - Language Server Protocol implementation
          
          ### Installation
          
          Download the appropriate tarball for your platform and extract:
          
          ```bash
          tar xzf ocaml-platform-5.3.0-*.tar.gz
          export PATH="$PWD/bin:$PATH"
          ```