name: Build Toolchain Binaries

on:
  push:
    tags:
      - 'toolchain-v*'
  workflow_dispatch:

jobs:
  build-tools:
    name: Build dev tools for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
        ocaml_version: ['5.3.0']
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Verify submodules
      run: |
        echo "=== Checking submodules ==="
        ls -la ocaml/
        test -d ocaml/ocaml-lsp-server || (echo "Error: ocaml-lsp-server submodule missing" && exit 1)
        test -d ocaml/odoc || (echo "Error: odoc submodule missing" && exit 1)
        test -d ocaml/ocamlformat || (echo "Error: ocamlformat submodule missing" && exit 1)
    
    - name: Setup OCaml ${{ matrix.ocaml_version }}
      uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: ${{ matrix.ocaml_version }}
    
    - name: Build ocaml-lsp-server
      run: |
        cd ocaml/ocaml-lsp-server
        opam install . --deps-only -y
        opam exec -- dune build @install
        opam exec -- dune install --prefix=../../_install
    
    - name: Build odoc
      run: |
        cd ocaml/odoc
        opam install . --deps-only -y
        opam exec -- dune build @install
        opam exec -- dune install --prefix=../../_install
    
    - name: Build ocamlformat
      run: |
        cd ocaml/ocamlformat
        opam install . --deps-only -y
        opam exec -- dune build @install
        opam exec -- dune install --prefix=../../_install
    
    - name: Package binaries
      run: |
        cd _install
        tar czf ../tusk-tools-${{ matrix.ocaml_version }}-${{ runner.os }}-${{ runner.arch }}.tar.gz bin/
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tusk-tools-${{ matrix.ocaml_version }}-${{ runner.os }}-${{ runner.arch }}
        path: tusk-tools-*.tar.gz
    
  release:
    needs: build-tools
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          tusk-tools-*/tusk-tools-*.tar.gz
        body: |
          Pre-built development tools for tusk toolchains.
          
          Includes:
          - ocamllsp (OCaml Language Server)
          - odoc (Documentation generator)
          - ocamlformat (Code formatter)